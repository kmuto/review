# Re:VIEW Builder/Renderer 互換性チェック設定
# 既知の差異や許容される差異を定義

html:
  whitespace:
    - description: "HTMLBuilder adds extra spaces around inline elements"
      pattern: '\s*<span\s+class=".*?">\s*'
      action: normalize
    - description: "Line breaks in HTML output may differ"
      pattern: '\n+'
      action: normalize_newlines
  
  attributes:
    - description: "HTML attribute order may differ between builder and renderer"
      elements: ["div", "span", "table", "th", "td"]
      action: ignore_order
  
  structure:
    - description: "Extra wrapper divs may be present"
      pattern: '<div[^>]*>\s*</div>'
      action: ignore_empty_divs

latex:
  spacing:
    - description: "Spacing around LaTeX commands may differ"
      pattern: '\\[a-zA-Z]+\s*\{'
      action: normalize_command_spacing
    - description: "Multiple consecutive newlines"
      pattern: '\n{3,}'
      action: normalize_newlines
  
  commands:
    - description: "LaTeX command formatting differences"
      pattern: '\\(begin|end)\s*\{\s*(\w+)\s*\}'
      action: normalize_environment_spacing
  
  math:
    - description: "Math mode spacing differences"
      pattern: '\$\s+|\s+\$'
      action: normalize_math_spacing

# グローバル設定
global:
  ignore_patterns:
    - '^\\s*$'  # 空行
    - '^\\s*%.*$'  # LaTeXコメント
    - '^\\s*<!--.*-->\\s*$'  # HTMLコメント
  
  normalization:
    remove_trailing_whitespace: true
    normalize_line_endings: true
    max_consecutive_newlines: 2